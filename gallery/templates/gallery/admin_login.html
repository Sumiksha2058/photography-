{% extends 'gallery/base.html' %}

{% block title %}Admin Login - Soul Lens Photography{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 2rem;">Admin Portal</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" style="margin-bottom: 1rem;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="post" action="{% url 'gallery:admin_login' %}">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="username" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2c3e50;">Username</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 1rem;">
        </div>
        
        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2c3e50;">Password</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 1rem;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 0.75rem; background-color: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s ease;">
            Login to Admin Panel
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: #666; font-size: 0.9rem;">
        Not an admin? <a href="{% url 'gallery:home' %}" style="color: #3498db; text-decoration: none;">Return to Gallery</a>
    </p>
</div>
{% endblock %}
